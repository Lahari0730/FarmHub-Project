{% extends 'base.html' %}

{% block content %}
<style>
    body {
        background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), 
                    url('https://images.unsplash.com/photo-1598519102179-6547728a67b1?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
        background-attachment: fixed;
        background-size: cover;
        background-position: center;
        min-height: 100vh;
        margin: 0;
        font-family: "Inter", system-ui, sans-serif;
    }
</style>

<div class="form-container" style="
    max-width: 500px; 
    margin: 50px auto; 
    padding: 30px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.35);
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    color: white;
">
    <h2 style="text-align: center; color: #2ecc71; margin-bottom: 25px; font-weight: 700;">
        {{ _('Create Account') }}
    </h2>
    
    <form method="post">
        <label>{{ _('Full Name') }}</label>
        <input type="text" name="name" required placeholder="{{ _('John Doe') }}"
               class="form-control mb-3"
               style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,.5); background: rgba(255,255,255,0.2); color: black;">

        <label>{{ _('Phone Number (Login ID)') }}</label>
        <input type="tel" name="phone" required placeholder="9876543210"
               class="form-control mb-3"
               style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,.5); background: rgba(255,255,255,0.2); color: white;">

        <label>{{ _('Password') }}</label>
        <input type="password" name="password" required
               class="form-control mb-3"
               style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,.5); background: rgba(255,255,255,0.2); color: white;">

        <label>{{ _('I am a:') }}</label>
        <select name="role" id="roleSelect" onchange="toggleFields()" required
                class="form-control mb-3"
                style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.5); background: rgba(255, 255, 255, 0.2); color: black;">
            <option value="customer">{{ _('Customer (Buy Produce)') }}</option>
            <option value="farmer">{{ _('Farmer (Sell Produce / Book Services)') }}</option>
            <option value="service_provider">{{ _('Service Provider (Equipment Owner)') }}</option>
        </select>

        <div id="locationWrapper" style="margin-top: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label><strong>{{ _('Location / Address') }}</strong></label>
                <button type="button" onclick="detectCity()" 
                        style="background: #2ecc71; border: none; color: white; padding: 2px 10px; border-radius: 5px; cursor: pointer; font-size: 12px;">
                    📍 {{ _('Detect My City') }}
                </button>
            </div>
            <textarea name="address" id="addressInput" required
                      placeholder="{{ _('City Name (e.g., Guntur)') }}"
                      style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,.5); background: rgba(255,255,255,0.2); color: white; margin-top: 5px;"></textarea>
            <small style="color: #dcdcdc;" id="addressHint">{{ _('Farmers will use this to show you nearby products.') }}</small>
        </div>

        <div id="upiField" style="display: none; margin-top: 15px; padding: 15px; 
             background: rgba(46, 204, 113, 0.15); border-radius: 10px; border: 1px dashed #2ecc71;">
            <label><strong>{{ _('Your UPI ID') }}</strong></label>
            <input type="text" name="upi_id" id="upiInput" placeholder="example@okaxis"
                   style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,.5); background: rgba(255,255,255,0.2); color: white;">
            <small style="color: #e0ffe5;">{{ _('Used so you can receive direct digital payments.') }}</small>
        </div>

        <button type="submit" class="btn btn-success"
                style="width: 100%; margin-top: 25px; padding: 12px; font-weight: bold;
                background: linear-gradient(135deg,#2ecc71,#27ae60);
                border: none; border-radius: 8px; color: white; cursor: pointer;">
            {{ _('Register') }}
        </button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; color: #f1f1f1;">
        {{ _('Already have an account?') }} 
        <a href="{{ url_for('login') }}" style="color: #2ecc71; font-weight: bold;">{{ _('Login here') }}</a>
    </p>
</div>

<script>
function toggleFields() {
    var roleSelect = document.getElementById("roleSelect");
    var upiField = document.getElementById("upiField");
    var upiInput = document.getElementById("upiInput");
    var addressHint = document.getElementById("addressHint");

    // All roles now need an address for the marketplace sorting to work
    if (roleSelect.value === "farmer" || roleSelect.value === "service_provider") {
        upiField.style.display = "block";
        upiInput.required = true;
        addressHint.innerText = "{{ _('This city will be shown to buyers looking for nearby products.') }}";
    } else {
        upiField.style.display = "none";
        upiInput.required = false;
        addressHint.innerText = "{{ _('Products from farmers in this city will appear first.') }}";
    }
}

async function detectCity() {
    const addressInput = document.getElementById('addressInput');
    addressInput.value = "Detecting...";

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        
        try {
            // Fetch city name from OpenStreetMap (Free Reverse Geocoding)
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
            const data = await response.json();
            const city = data.address.city || data.address.town || data.address.village || data.address.state;
            addressInput.value = city;
        } catch (error) {
            addressInput.value = "";
            alert("Could not detect city. Please type it manually.");
        }
    }, () => {
        addressInput.value = "";
        alert("Location access denied.");
    });
}

window.onload = toggleFields;
</script>
{% endblock %}
