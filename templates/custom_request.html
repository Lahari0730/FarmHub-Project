{% extends 'base.html' %}
{% block content %}
<div style="
    background: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed; 
    background-size: cover; 
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
"></div>

<div class="container-fluid" style="min-height: 100vh; padding-top: 80px;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg p-4 border-start border-primary border-4" style="background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(12px); border-radius: 15px; border-top: 1px solid rgba(255,255,255,0.3); border-right: 1px solid rgba(255,255,255,0.3); border-bottom: 1px solid rgba(255,255,255,0.3);">
                    
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h3 class="text-primary mb-0" style="text-shadow: 1px 1px 2px rgba(255,255,255,0.8);">{{ _('Custom Service Request') }}</h3>
                        <a href="{{ url_for('services') }}" class="btn-close"></a>
                    </div>

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ _('Service Type') }}</label>
                            <select name="service_type" class="form-select" style="background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(0,0,0,0.1);">
                                <option>Tractor Rental</option>
                                <option>Drone Spraying</option>
                                <option>Soil Testing</option>
                                <option>Labor Requirement</option>
                                <option>Veterinary Visit</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ _('Location & Details') }}</label>
                            <textarea name="details" class="form-control" rows="4" required placeholder="E.g., Need tractor for 2 acres in Village XYZ" style="background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(0,0,0,0.1);"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 shadow fw-bold">{{ _('Post Request') }}</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Ensure the body and html don't create unwanted scrollbars or white space */
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }

    .form-label {
        color: #000;
        font-size: 1.1rem;
    }

    .btn-primary {
        background-color: #0d6efd;
        border: none;
        padding: 12px;
    }

    .btn-primary:hover {
        background-color: #0b5ed7;
        transform: translateY(-1px);
    }
</style>
{% endblock %}
