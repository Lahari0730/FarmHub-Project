{% extends 'base.html' %}

{% block content %}
<style>
    body {
        background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.45)),
                    url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1920&q=80');
        background-attachment: fixed;
        background-size: cover;
        background-position: center;
        margin: 0;
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
    }

    .login-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 80px);
        padding: 20px;
    }

    .form-container {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(18px) saturate(150%);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 14px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        color: white;
        box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }

    h2 { text-align: center; color: #2ecc71; margin-bottom: 25px; }

    .input-field {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        color: white;
        box-sizing: border-box;
    }

    .btn-primary {
        background: linear-gradient(135deg,#2ecc71,#27ae60);
        color: white;
        padding: 14px;
        border: none;
        border-radius: 8px;
        width: 100%;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #2ecc71;
        text-decoration: none;
        font-size: 0.9rem;
    }
</style>

<div class="login-wrapper">
    <div class="form-container">
        <h2>{{ _('Reset Password') }}</h2>
        <form method="post" action="{{ url_for('reset_password') }}">
            <label>{{ _('Phone Number') }}</label>
            <input type="tel" name="phone" class="input-field" placeholder="Enter registered phone" required>

            <label>{{ _('New Password') }}</label>
            <input type="password" name="password" class="input-field" placeholder="••••••••" required>

            <label>{{ _('Confirm New Password') }}</label>
            <input type="password" name="confirm_password" class="input-field" placeholder="••••••••" required>

            <button type="submit" class="btn-primary">{{ _('Update Password') }}</button>
        </form>
        <a href="{{ url_for('login') }}" class="back-link">← {{ _('Back to Login') }}</a>
    </div>
</div>
{% endblock %}
