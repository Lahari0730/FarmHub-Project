{% extends 'base.html' %}

{% block content %}
<style>
    body {
        background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), 
                    url('https://images.unsplash.com/photo-1598519102179-6547728a67b1?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
        background-attachment: fixed; background-size: cover; min-height: 100vh;
    }
</style>

<div class="form-container" style="max-width: 550px; margin: 50px auto; padding: 30px; 
    background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); 
    border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.35); color: white;">
    
    <h2 style="text-align: center; color: #2ecc71; font-weight: 700;">{{ _('My Profile') }}</h2>
    <p style="text-align: center; color: #ddd;">{{ _('Manage your account details below') }}</p>

    <form method="post">
        <div class="mb-3">
            <label class="form-label">{{ _('Full Name') }}</label>
            <input type="text" name="name" value="{{ user['name'] }}" required class="form-control"
                   style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3);">
        </div>

        <div class="mb-3">
            <label class="form-label">{{ _('Phone Number (Cannot be changed)') }}</label>
            <input type="text" value="{{ user['phone'] }}" disabled class="form-control"
                   style="background: rgba(0,0,0,0.2); color: #aaa; border: 1px solid rgba(255,255,255,0.1);">
        </div>

        <div class="mb-3">
            <label class="form-label">{{ _('Your Role') }}</label>
            <span class="badge bg-success d-block p-2" style="font-size: 0.9rem;">{{ user['role'] | upper }}</span>
        </div>

        <div class="mb-3">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label class="form-label"><strong>{{ _('Address') }}</strong></label>
                <button type="button" onclick="detectCity()" 
                        style="background: #2ecc71; border: none; color: white; padding: 2px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-bottom: 5px;">
                    📍 {{ _('Detect My City') }}
                </button>
            </div>
            <textarea name="address" id="addressInput" rows="3" class="form-control" 
                      style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3);">{{ user['address'] }}</textarea>
            <small style="color: #ccc;">{{ _('Used for delivery and service requests.') }}</small>
        </div>

        {% if user['role'] != 'customer' %}
        <div class="mb-3">
            <label class="form-label"><strong>{{ _('UPI ID') }}</strong></label>
            <input type="text" name="upi_id" value="{{ user['upi_id'] }}" class="form-control"
                   style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3);">
        </div>
        {% endif %}

        <button type="submit" class="btn btn-success w-100 py-2 mt-3" 
                style="background: linear-gradient(135deg,#2ecc71,#27ae60); border: none; font-weight: bold;">
            {{ _('Save Profile Changes') }}
        </button>
    </form>

    <div class="mt-4 text-center">
        <a href="{{ url_for('dashboard') }}" style="color: white; text-decoration: none;">← {{ _('Back to Dashboard') }}</a>
    </div>
</div>

<script>
async function detectCity() {
    const addressInput = document.getElementById('addressInput');
    const originalValue = addressInput.value;
    addressInput.value = "Detecting...";

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            try {
                // Fetch city name from OpenStreetMap (Reverse Geocoding)
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
                const data = await response.json();
                const city = data.address.city || data.address.town || data.address.village || data.address.state || originalValue;
                addressInput.value = city;
            } catch (error) {
                addressInput.value = originalValue;
                alert("Could not detect city. Please type it manually.");
            }
        }, () => {
            addressInput.value = originalValue;
            alert("Location access denied.");
        });
    } else {
        alert("Geolocation is not supported by your browser.");
        addressInput.value = originalValue;
    }
}
</script>
{% endblock %}
