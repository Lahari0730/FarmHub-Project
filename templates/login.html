{% extends 'base.html' %}

{% block content %}
<style>
    body {
        background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.45)),
                    url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1920&q=80');
        background-attachment: fixed;
        background-size: cover;
        background-position: center;
        margin: 0;
        min-height: 100vh;
        font-family: 'Inter', system-ui, sans-serif;
    }

    /* Wrapper — centers only login area, not navbar */
    .login-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 80px); /* keeps navbar space */
        padding-top: 20px;
        padding-bottom: 20px;
    }

    /* Logo */
    .logo-container {
        margin-bottom: 14px;
        text-align: center;
    }

    .logo-container img {
        max-width: 200px;
        height: auto;
        filter: drop-shadow(0 4px 10px rgba(0,0,0,0.55));
    }

    /* Glass Card */
    .form-container {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(18px) saturate(150%);
        -webkit-backdrop-filter: blur(18px) saturate(150%);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 14px;
        padding: 42px 36px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 28px 60px rgba(0,0,0,0.35);
        color: white;
        box-sizing: border-box;
        animation: fadeUp .45s ease-out;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    h2 {
        text-align: center;
        margin-bottom: 26px;
        font-weight: 800;
        letter-spacing: .3px;
        color: #2ecc71;
        font-size: 1.9rem;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: .9rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.9);
    }

    .input-field {
        width: 100%;
        padding: 12px 12px;
        margin-bottom: 18px;
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 8px;
        color: white;
        font-size: 1rem;
        box-sizing: border-box;
        transition: .25s;
    }

    .input-field::placeholder {
        color: rgba(255,255,255,.65);
    }

    .input-field:focus {
        outline: none;
        border-color: #2ecc71;
        background: rgba(255, 255, 255, 0.2);
        box-shadow: 0 0 0 3px rgba(46, 204, 113, .25);
    }

    /* New styles for Forgot Password link */
    .forgot-link-container {
        display: flex;
        justify-content: flex-end;
        margin-top: -12px;
        margin-bottom: 20px;
    }

    .forgot-link {
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        transition: 0.2s;
    }

    .forgot-link:hover {
        color: #2ecc71;
        text-decoration: underline;
    }

    .btn-primary {
        background: linear-gradient(135deg,#2ecc71,#27ae60);
        border: none;
        color: white;
        padding: 14px;
        border-radius: 8px;
        width: 100%;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .5px;
        cursor: pointer;
        transition: .25s;
    }

    .btn-primary:hover {
        background: #1e8449;
        transform: translateY(-2px);
    }

    .register-link {
        text-align: center;
        margin-top: 16px;
        font-size: .9rem;
        color: rgba(255, 255, 255, 0.75);
    }

    .register-link a {
        color: #2ecc71;
        font-weight: 600;
        text-decoration: none;
    }

    .register-link a:hover {
        text-decoration: underline;
    }

    @media(max-width: 600px) {
        .form-container { padding: 32px 26px; }
        .logo-container img { max-width: 110px; }
    }
</style>

<div class="login-wrapper">

    <div class="logo-container">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="FarmHub Logo">
    </div>

    <div class="form-container">
        <h2>{{ _('Login') }}</h2>

        <form method="post">
            <label>{{ _('Phone Number') }}</label>
            <input type="tel" name="phone" class="input-field" placeholder="Enter phone number" required>

            <label>{{ _('Password') }}</label>
            <input type="password" name="password" class="input-field" placeholder="••••••••" required>

            <div class="forgot-link-container">
                <a href="{{ url_for('forgot_password') }}" class="forgot-link">{{ _('Forgot password?') }}</a>
            </div>

            <button type="submit" class="btn-primary">{{ _('Login') }}</button>
        </form>

        <div class="register-link">
            {{ _('New here?') }}
            <a href="{{ url_for('register') }}">{{ _('Create account') }}</a>
            <span style="margin: 0 5px; opacity: 0.5;">|</span>
            <a href="{{ url_for('reset_password') }}">{{ _('Reset') }}</a>
        </div>
    </div>

</div>
{% endblock %}
